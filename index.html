<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プレゼンタイマー</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #003087;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.4s;
      overflow: hidden;
    }

    body.warning  { background: #5c1010; }
    body.finished { background: #0a3d1f; }

    /* ── 通常モード ── */
    .timer-display {
      font-size: clamp(6rem, 22vw, 18rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      color: #ffffff;
      text-shadow: 0 0 60px rgba(255,255,255,0.15);
      line-height: 1;
      user-select: none;
      transition: color 0.4s, text-shadow 0.4s;
    }

    body.warning  .timer-display { color: #ff6b6b; text-shadow: 0 0 80px rgba(255,107,107,0.4); }
    body.finished .timer-display { color: #69db7c; text-shadow: 0 0 80px rgba(105,219,124,0.4); }

    .status-label {
      margin-top: 1rem;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      height: 1.4em;
      transition: color 0.4s;
    }

    body.warning  .status-label { color: rgba(255,107,107,0.7); }
    body.finished .status-label { color: rgba(105,219,124,0.7); }

    .controls {
      margin-top: 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .time-setter {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .time-setter label {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.05em;
    }

    .time-setter input[type="number"] {
      width: 5rem;
      padding: 0.45rem 0.6rem;
      font-size: 1.1rem;
      font-weight: 600;
      text-align: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    .time-setter input[type="number"]:focus { border-color: rgba(255,255,255,0.4); }
    .time-setter input[type="number"]::-webkit-inner-spin-button { opacity: 0.4; }

    .buttons { display: flex; gap: 0.8rem; }

    button {
      padding: 0.6rem 1.8rem;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s, background 0.2s;
    }

    button:active { transform: scale(0.96); }

    #btn-start { background: rgba(255,255,255,0.9); color: #003087; }
    #btn-start:hover { background: #fff; }

    #btn-reset {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.15);
    }
    #btn-reset:hover { background: rgba(255,255,255,0.16); }

    .hint {
      margin-top: 2.5rem;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.04em;
    }

    /* 最小化ボタン（通常時） */
    #btn-minimize {
      position: fixed;
      top: 12px;
      right: 14px;
      padding: 4px 10px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      z-index: 100;
    }
    #btn-minimize:hover { background: rgba(255,255,255,0.2); color: #fff; }

    /* ── ミニバーモード ── */
    .mini-bar {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px 0 7px;
      gap: 3px;
    }

    .mini-time {
      font-size: 0.82rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
      color: #fff;
      white-space: nowrap;
      user-select: none;
    }

    body.warning  .mini-time { color: #ff6b6b; }
    body.finished .mini-time { color: #69db7c; }

    .mini-controls {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .mini-btn {
      padding: 1px 5px;
      font-size: 9px;
      font-weight: 600;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    #mini-start {
      background: rgba(255,255,255,0.85);
      color: #003087;
    }
    #mini-start:hover { background: #fff; }

    #mini-reset {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.15);
    }
    #mini-reset:hover { background: rgba(255,255,255,0.2); }

    #mini-expand {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 9px;
      padding: 1px 4px;
    }
    #mini-expand:hover { background: rgba(255,255,255,0.2); color: #fff; }

    /* ミニバー有効時 */
    body.mini .main-ui    { display: none; }
    body.mini .mini-bar   { display: flex; }
    body.mini #btn-minimize { display: none; }
  </style>
</head>
<body>

  <button id="btn-minimize">⊟ 最小化</button>

  <!-- 通常UI -->
  <div class="main-ui" style="display:contents">
    <div class="timer-display" id="display">00:00</div>
    <div class="status-label" id="status"></div>

    <div class="controls">
      <div class="time-setter">
        <label for="minutes">分数を設定</label>
        <input type="number" id="minutes" value="5" min="1" max="999">
        <label>分</label>
      </div>
      <div class="buttons">
        <button id="btn-start">スタート</button>
        <button id="btn-reset">リセット</button>
      </div>
    </div>

    <div class="hint">スペースキーでスタート / 一時停止　　Mキーで最小化</div>
  </div>

  <!-- ミニバー -->
  <div class="mini-bar">
    <div class="mini-time" id="mini-display">00:00</div>
    <div class="mini-controls">
      <button class="mini-btn" id="mini-start">▶</button>
      <button class="mini-btn" id="mini-reset">↺</button>
      <button class="mini-btn" id="mini-expand">⊞</button>
    </div>
  </div>

<script>
  const display      = document.getElementById('display');
  const miniDisplay  = document.getElementById('mini-display');
  const status       = document.getElementById('status');
  const btnStart     = document.getElementById('btn-start');
  const btnReset     = document.getElementById('btn-reset');
  const btnMinimize  = document.getElementById('btn-minimize');
  const miniStart    = document.getElementById('mini-start');
  const miniReset    = document.getElementById('mini-reset');
  const miniExpand   = document.getElementById('mini-expand');
  const minutesEl    = document.getElementById('minutes');

  let totalSeconds   = 0;
  let remaining      = 0;
  let timerId        = null;
  let running        = false;
  let warningSounded = false;

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function beep(freq, dur, type = 'sine', vol = 0.6) {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + dur);
  }

  function playWarningSound() {
    beep(880, 0.15, 'sine', 0.5);
    setTimeout(() => beep(880, 0.15, 'sine', 0.5), 220);
    setTimeout(() => beep(880, 0.15, 'sine', 0.5), 440);
  }

  function playFinishedSound() {
    beep(523, 0.25, 'sine', 0.5);
    setTimeout(() => beep(659, 0.25, 'sine', 0.5), 280);
    setTimeout(() => beep(784, 0.25, 'sine', 0.5), 560);
    setTimeout(() => beep(1047, 0.5, 'sine', 0.5), 840);
  }

  function fmt(s) {
    const m   = Math.floor(s / 60).toString().padStart(2, '0');
    const sec = (s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  }

  function setBodyState(state) {
    document.body.classList.remove('warning', 'finished');
    if (state) document.body.classList.add(state);
  }

  function syncMiniStart() {
    miniStart.textContent = running ? '⏸' : '▶';
  }

  function updateDisplay() {
    const t = fmt(remaining);
    display.textContent     = t;
    miniDisplay.textContent = t;

    if (remaining === 0 && totalSeconds > 0) {
      setBodyState('finished');
      status.textContent = '終了';
      playFinishedSound();
    } else if (remaining <= 60 && remaining > 0) {
      if (!warningSounded) { warningSounded = true; playWarningSound(); }
      setBodyState('warning');
      status.textContent = '残り1分';
    } else {
      setBodyState(null);
      status.textContent = running ? '進行中' : '';
    }
  }

  function start() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (remaining === 0) {
      totalSeconds = parseInt(minutesEl.value, 10) * 60 || 0;
      if (totalSeconds <= 0) return;
      remaining = totalSeconds;
      warningSounded = false;
    }
    running = true;
    btnStart.textContent = '一時停止';
    status.textContent = '進行中';
    syncMiniStart();

    timerId = setInterval(() => {
      remaining--;
      updateDisplay();
      if (remaining <= 0) {
        clearInterval(timerId);
        timerId = null;
        running = false;
        btnStart.textContent = 'スタート';
        syncMiniStart();
      }
    }, 1000);
  }

  function pause() {
    clearInterval(timerId);
    timerId = null;
    running = false;
    btnStart.textContent = 'スタート';
    status.textContent = '一時停止中';
    syncMiniStart();
  }

  function reset() {
    clearInterval(timerId);
    timerId = null;
    running = false;
    totalSeconds = 0;
    remaining = 0;
    warningSounded = false;
    const t = fmt(0);
    display.textContent     = t;
    miniDisplay.textContent = t;
    status.textContent = '';
    btnStart.textContent = 'スタート';
    syncMiniStart();
    setBodyState(null);
  }

  function enterMini() {
    document.body.classList.add('mini');
    syncMiniStart();
    try { window.resizeTo(189, 38); } catch(e) {}
  }

  function exitMini() {
    document.body.classList.remove('mini');
    try { window.resizeTo(800, 600); } catch(e) {}
  }

  btnStart.addEventListener('click',    () => { if (running) pause(); else start(); });
  btnReset.addEventListener('click',    reset);
  btnMinimize.addEventListener('click', enterMini);
  miniStart.addEventListener('click',   () => { if (running) pause(); else start(); });
  miniReset.addEventListener('click',   reset);
  miniExpand.addEventListener('click',  exitMini);

  document.addEventListener('keydown', (e) => {
    if (e.target !== document.body) return;
    if (e.code === 'Space') { e.preventDefault(); if (running) pause(); else start(); }
    if (e.code === 'KeyM')  { document.body.classList.contains('mini') ? exitMini() : enterMini(); }
  });

  minutesEl.addEventListener('change', () => {
    if (!running && remaining === 0) {
      const t = fmt((parseInt(minutesEl.value, 10) || 0) * 60);
      display.textContent     = t;
      miniDisplay.textContent = t;
    }
  });

  const init = fmt((parseInt(minutesEl.value, 10) || 0) * 60);
  display.textContent     = init;
  miniDisplay.textContent = init;
</script>
</body>
</html>
